<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>英検3級 発音チェック</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:linear-gradient(160deg,#0a0c1e 0%,#10152a 100%);
      color:#ddd9f0;
      font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;
      display:flex;justify-content:center;font-size:16px;
    }
    .app{width:100%;max-width:680px;min-height:100vh;padding-bottom:48px;}

    /* Header */
    .header{padding:22px 28px 18px;border-bottom:1px solid #1e1b38;display:flex;align-items:center;justify-content:space-between;}
    .header-label{font-size:11px;letter-spacing:.18em;color:#5c59a0;text-transform:uppercase;margin-bottom:4px;}
    .header-title{font-size:20px;font-weight:700;color:#e8e4ff;}
    .header-sub{font-size:13px;color:#7c77a8;margin-top:2px;}
    input[type="date"]{background:#1a1730;border:1px solid #2e2b50;border-radius:10px;color:#b0acdc;padding:9px 13px;font-size:15px;outline:none;font-family:inherit;}

    /* Day info */
    .day-info{padding:14px 28px 0;}
    .day-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
    .day-badge{background:#3a36a8;color:#c8c5ff;font-size:13px;font-weight:700;padding:5px 16px;border-radius:20px;}
    .mode-badge{font-size:12px;font-weight:600;padding:5px 13px;border-radius:20px;}
    .mode-study{background:#0a2010;color:#50c878;border:1px solid #1a4a28;}
    .mode-quiz{background:#1a1230;color:#9b79e0;border:1px solid #3a2860;}
    .word-range{font-size:13px;color:#5c59a0;}
    .counter{margin-left:auto;font-size:13px;color:#5c5888;}
    .progress-track{height:4px;background:#1a1730;border-radius:2px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:2px;transition:width .4s ease;}

    /* Main */
    .main{padding:18px 28px 0;}

    /* Mode Select */
    .mode-select{padding:8px 0;}
    .mode-select-title{font-size:22px;font-weight:700;color:#e8e4ff;text-align:center;margin-bottom:6px;}
    .mode-select-sub{font-size:13px;color:#5c59a0;text-align:center;margin-bottom:28px;}
    .mode-btn{display:flex;align-items:center;gap:18px;width:100%;padding:22px;border-radius:14px;border:1px solid;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:14px;transition:all .15s;}
    .mode-btn-study{background:#0a2010;border-color:#1a4a28;color:#c0e8c8;}
    .mode-btn-study:hover{background:#0e2a18;}
    .mode-btn-quiz{background:#1a1230;border-color:#3a2860;color:#c8b0f8;}
    .mode-btn-quiz:hover{background:#201840;}
    .mode-btn-stats{background:#0e1828;border-color:#1e3850;color:#78b8e8;margin-top:4px;}
    .mode-btn-stats:hover{background:#142030;}
    .mode-btn-icon{font-size:28px;flex-shrink:0;width:36px;text-align:center;}
    .mode-btn-label{font-size:17px;font-weight:700;margin-bottom:4px;}
    .mode-btn-desc{font-size:13px;opacity:.7;line-height:1.5;}

    /* Word Card */
    .word-card{border-radius:18px;padding:26px 24px 22px;margin-bottom:14px;position:relative;overflow:hidden;background:#14122a;border:1px solid rgba(124,119,209,.16);}
    .glow{position:absolute;top:-20px;right:-20px;width:120px;height:120px;border-radius:50%;pointer-events:none;}
    .word-meta{display:flex;gap:10px;align-items:center;margin-bottom:14px;}
    .word-num{font-size:13px;color:#3a3860;}
    .pos-badge{font-size:12px;font-weight:600;padding:3px 11px;border-radius:5px;}
    .word-en{font-size:48px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:6px;line-height:1.1;}
    .word-ja{font-size:24px;font-weight:500;margin-bottom:22px;opacity:.9;}
    .example-box{background:#0e0c20;border-radius:14px;padding:18px;}
    .ex-en{font-size:17px;color:#c0bce8;line-height:1.75;margin-bottom:9px;font-weight:500;}
    .ex-ja{font-size:14px;color:#5c5888;line-height:1.6;}

    /* Conjugation Card (with pronunciation check) */
    .conj-card{border-radius:18px;padding:24px 22px;margin-bottom:14px;background:#0f1a14;border:1px solid rgba(80,200,120,.2);}
    .conj-header{display:flex;gap:10px;align-items:center;margin-bottom:18px;}
    .conj-label{font-size:11px;letter-spacing:.15em;color:#3a8a56;text-transform:uppercase;font-weight:600;}
    .conj-rows{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
    .conj-row{display:flex;align-items:center;gap:14px;background:#0a1a10;border-radius:12px;padding:14px 18px;}
    .conj-role{font-size:12px;color:#3a6a46;width:56px;flex-shrink:0;}
    .conj-form{font-size:30px;font-weight:800;color:#fff;letter-spacing:-.5px;flex:1;}
    .conj-form.same{color:#5a7a62;font-size:26px;}
    .conj-play{border-radius:10px;padding:12px 20px;font-size:15px;cursor:pointer;font-family:inherit;transition:all .2s;background:#1a3a22;border:1px solid #2a5a32;color:#60c070;font-weight:600;display:flex;align-items:center;gap:8px;width:100%;justify-content:center;margin-bottom:16px;}
    .conj-play.playing{background:rgba(80,200,120,.15);border-color:rgba(80,200,120,.5);color:#80e090;}

    /* Pronunciation Check Section */
    .pronun-section{border-top:1px solid rgba(80,200,120,.2);padding-top:18px;transition:opacity .3s;}
    .pronun-intro{font-size:15px;font-weight:700;color:#80e090;text-align:center;margin-bottom:18px;}
    .pronun-step{
      background:#081408;
      border:2px solid #1a4a28;
      border-radius:16px;
      padding:20px 18px;
      margin-bottom:14px;
      transition:all .3s;
    }
    .pronun-step.active{border-color:#40c060;background:#0a1e0a;}
    .pronun-step.done-ok{border-color:#50c878;background:#061a0a;}
    .pronun-step.done-ng{border-color:#c05050;background:#1a0808;}
    .pronun-step-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#3a6a46;margin-bottom:6px;}
    .pronun-step-word{font-size:36px;font-weight:800;color:#c0e8c0;letter-spacing:-.5px;margin-bottom:14px;}
    .pronun-step.done-ok .pronun-step-word{color:#50c878;}
    .pronun-step.done-ng .pronun-step-word{color:#e06060;}

    /* Mic button */
    .mic-btn{
      width:100%;
      padding:18px;
      border-radius:14px;
      font-size:18px;
      font-weight:700;
      font-family:inherit;
      cursor:pointer;
      transition:all .2s;
      background:#1a3a22;
      border:2px solid #2a5a32;
      color:#60c070;
      display:flex;align-items:center;justify-content:center;gap:10px;
    }
    .mic-btn:hover{background:#204a28;border-color:#40a050;}
    .mic-btn.listening{
      background:#0a2a10;
      border-color:#60d070;
      color:#80f090;
      animation:pulse-border 1s ease-in-out infinite;
    }
    .mic-btn.disabled{opacity:.4;cursor:default;}
    @keyframes pulse-border{0%,100%{border-color:#60d070;box-shadow:0 0 0 0 rgba(96,208,112,.4);}50%{border-color:#80f090;box-shadow:0 0 0 8px rgba(96,208,112,.0);}}

    .pronun-result{
      margin-top:12px;
      padding:14px 16px;
      border-radius:12px;
      font-size:16px;
      font-weight:600;
      line-height:1.6;
      display:none;
    }
    .pronun-result.ok{background:#0a2010;color:#50e878;border:1px solid #1a5028;display:block;}
    .pronun-result.ng{background:#200a0a;color:#e06060;border:1px solid #501818;display:block;}

    /* Pronun Summary */
    .pronun-summary{
      background:#0a1e10;
      border:2px solid #30a050;
      border-radius:16px;
      padding:22px 18px;
      text-align:center;
      margin-top:4px;
    }
    .pronun-stars{font-size:36px;margin-bottom:8px;letter-spacing:4px;}
    .pronun-score{font-size:22px;font-weight:800;color:#80f090;margin-bottom:6px;}
    .pronun-msg{font-size:15px;color:#60c878;}

    /* Quiz Card */
    .quiz-card{border-radius:18px;padding:24px 22px;margin-bottom:14px;background:#13102a;border:1px solid rgba(155,121,224,.2);}
    .quiz-review-badge{font-size:11px;background:#2a1a40;color:#9b79e0;border:1px solid #4a2a70;border-radius:5px;padding:3px 10px;display:inline-block;margin-bottom:12px;}
    .quiz-sentence{font-size:19px;color:#c0bce8;line-height:1.85;margin-bottom:8px;font-weight:500;}
    .quiz-blank{display:inline-block;background:#2a2050;border-bottom:2.5px solid #6a5aaa;color:#6a5aaa;padding:0 14px;border-radius:5px 5px 0 0;font-weight:700;font-size:19px;min-width:90px;text-align:center;}
    .quiz-ja{font-size:14px;color:#5c5888;line-height:1.6;margin-bottom:22px;}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .choice-btn{padding:20px 12px;border-radius:14px;font-size:19px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;background:#1a1730;border:1px solid #2e2b50;color:#c0bce8;text-align:center;min-height:72px;display:flex;align-items:center;justify-content:center;}
    .choice-btn:hover:not(:disabled){background:#242040;border-color:#4a4080;}
    .choice-btn:active:not(:disabled){transform:scale(.97);}
    .choice-btn.correct{background:#0a2a10!important;border-color:#40a060!important;color:#60e080!important;}
    .choice-btn.wrong{background:#2a0a0a!important;border-color:#a04040!important;color:#e06060!important;}
    .choice-btn.show-correct{background:#0a2a10!important;border-color:#40a060!important;color:#60e080!important;}
    .choice-btn:disabled{cursor:default;}
    .quiz-result{font-size:15px;font-weight:600;margin-top:14px;padding:13px 16px;border-radius:12px;display:none;line-height:1.6;}
    .quiz-result.correct{background:#0a2010;color:#50d070;border:1px solid #1a5028;display:block;}
    .quiz-result.wrong{background:#200a0a;color:#e06060;border:1px solid #501818;display:block;}

    /* Nav */
    .nav{display:flex;gap:12px;}
    .nav-btn{padding:17px 16px;border-radius:14px;font-size:16px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s;min-height:58px;}
    .nb-prev{flex:1;background:#1a1730;border:1px solid #2e2b50;color:#7c77a8;}
    .nb-prev:disabled{background:#0e0c1e;color:#2e2b50;cursor:default;}
    .nb-study{flex:2;background:#3a36a8;color:#fff;border:none;}
    .nb-conj{flex:2;background:#1a3a22;color:#60c070;border:1px solid #2a5a32;}
    .nb-quiz{flex:2;background:#3a2880;color:#c8b0f8;border:none;}

    /* Summary */
    .summary-card{border-radius:18px;padding:26px 22px;background:#13102a;border:1px solid rgba(155,121,224,.2);margin-bottom:14px;}
    .summary-title{font-size:20px;font-weight:700;color:#e8e4ff;margin-bottom:18px;}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid #1e1b30;}
    .summary-row:last-child{border-bottom:none;}
    .summary-label{font-size:15px;color:#7c77a8;}
    .summary-val{font-size:24px;font-weight:700;}
    .val-good{color:#50c878;}.val-warn{color:#f5a623;}.val-bad{color:#e06060;}
    .weak-list{margin-top:18px;}
    .weak-title{font-size:12px;color:#5c59a0;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
    .weak-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#0e0c20;border-radius:10px;margin-bottom:8px;}
    .weak-word{font-size:17px;font-weight:700;color:#c0bce8;}
    .weak-cnt{font-size:12px;color:#9b79e0;background:#2a1a40;padding:3px 10px;border-radius:5px;}
    .hist-section{margin-top:20px;border-top:1px solid #1e1b30;padding-top:18px;}
    .hist-title{font-size:12px;color:#5c59a0;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;}
    .hist-chart{display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:12px;}
    .hist-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0;}
    .hist-bar-bg{width:100%;background:#1a1730;border-radius:4px;overflow:hidden;height:56px;display:flex;align-items:flex-end;}
    .hist-bar-fill{width:100%;border-radius:3px;transition:height .5s ease;min-height:3px;}
    .hist-bar-pct{font-size:9px;color:#5c5888;text-align:center;width:100%;}
    .hist-bar-date{font-size:9px;color:#3a3860;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .hist-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #13112a;}
    .hist-row:last-child{border-bottom:none;}
    .hist-row-date{font-size:13px;color:#7c77a8;flex:1;}
    .hist-row-day{font-size:12px;color:#3a3860;width:48px;text-align:center;}
    .hist-row-bar{flex:2;height:6px;background:#1a1730;border-radius:3px;overflow:hidden;margin:0 10px;}
    .hist-row-fill{height:100%;border-radius:3px;}
    .hist-row-pct{font-size:15px;font-weight:700;width:40px;text-align:right;}
    .stats-page{padding:4px 0;}
    .stats-back{display:flex;align-items:center;gap:8px;background:none;border:none;color:#5c59a0;font-size:14px;font-family:inherit;cursor:pointer;padding:4px 0 22px;width:100%;}
    .stats-back:hover{color:#8884cc;}
    .stats-section-title{font-size:12px;color:#5c59a0;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;margin-top:4px;}
    .center-msg{text-align:center;padding:56px 24px;}
    .center-icon{font-size:40px;margin-bottom:12px;}
    .center-title{font-size:20px;font-weight:700;color:#8884cc;margin-bottom:8px;}
    .center-sub{font-size:14px;color:#5c59a0;line-height:1.8;}

    /* ── Word List ── */
    .wordlist-page{padding:4px 0}
    .wordlist-back{display:flex;align-items:center;gap:8px;background:none;border:none;color:#5c59a0;font-size:14px;font-family:inherit;cursor:pointer;padding:4px 0 20px;width:100%}
    .wordlist-back:hover{color:#8884cc}
    .wordlist-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
    .wordlist-title{font-size:17px;font-weight:700;color:#e8e4ff}
    .wordlist-count{font-size:12px;color:#5c5888}
    .wordlist-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#14122a;border:1px solid #1e1b38;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
    .wordlist-item:hover{background:#1a1730;border-color:#2e2b50}
    .wordlist-item:active{transform:scale(.98)}
    .wordlist-rank{font-size:12px;color:#3a3860;width:24px;text-align:right;flex-shrink:0}
    .wordlist-word{font-size:20px;font-weight:700;color:#e8e4ff;flex:1}
    .wordlist-meaning{font-size:12px;color:#5c5888;flex:1;text-align:right;line-height:1.4}
    .wordlist-badge{font-size:11px;border-radius:4px;padding:3px 8px;white-space:nowrap;flex-shrink:0}
    .badge-weak{background:#200a0a;color:#e06060;border:1px solid #501818}
    .badge-ok{background:#0a2010;color:#50c878;border:1px solid #1a5028}
    .badge-new{background:#1a1230;color:#9b79e0;border:1px solid #3a2860}
    .wordlist-empty{font-size:14px;color:#3a3860;text-align:center;padding:32px 0;line-height:1.9}

    /* ── Home button (floating) ── */
    .home-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#3a36a8;border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:all .2s;z-index:100;display:flex;align-items:center;justify-content:center;}
    .home-fab:hover{background:#4a44c8;transform:scale(1.08);}
    .home-fab.hidden-fab{display:none;}
    .hidden{display:none;}
    .no-mic-notice{font-size:13px;color:#5c5888;text-align:center;padding:12px;background:#0e0c20;border-radius:10px;margin-top:10px;}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-label">英検3級 · でる順パス単</div>
      <div class="header-title">音読＆発音チェック</div>
    </div>
    <input type="date" id="dateInput" value="2026-04-20" min="2026-04-20" max="2026-05-30"/>
  </div>
  <div class="day-info">
    <div class="day-row">
      <span class="day-badge" id="dayBadge">Day 1</span>
      <span class="mode-badge mode-study" id="modeBadge">学習</span>
      <span class="word-range" id="wordRange">第1語〜第25語</span>
      <span class="counter hidden" id="counter"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="main">

    <!-- モード選択 -->
    <div id="modeSelectView" class="hidden">
      <div class="mode-select">
        <div class="mode-select-title" id="modeSelectTitle">Day 1</div>
        <div class="mode-select-sub" id="modeSelectSub">どちらから始めますか？</div>
        <button class="mode-btn mode-btn-study" onclick="startStudy()">
          <span class="mode-btn-icon">📖</span>
          <div><div class="mode-btn-label">学習モード</div><div class="mode-btn-desc">単語カード → 活用形＆発音チェック</div></div>
        </button>
        <button class="mode-btn mode-btn-quiz" onclick="startQuizFromSelect()">
          <span class="mode-btn-icon">✏️</span>
          <div><div class="mode-btn-label">クイズモード</div><div class="mode-btn-desc">今日の単語＋復習語で4択テスト</div></div>
        </button>
        <button class="mode-btn mode-btn-stats" onclick="showStats()">
          <span class="mode-btn-icon">📊</span>
          <div><div class="mode-btn-label">成果を見る</div><div class="mode-btn-desc">スコア履歴・苦手な単語を確認</div></div>
        </button>
        <button class="mode-btn" style="background:#0e0c20;border-color:#2e2b50;color:#c0bce8" onclick="showWordList()">
          <span class="mode-btn-icon">📋</span>
          <div>
            <div class="mode-btn-label">単語一覧</div>
            <div class="mode-btn-desc">学習済みの単語を苦手順で確認</div>
          </div>
        </button>
      </div>
    </div>

    <!-- 単語一覧 -->
    <!-- 単語一覧 -->
    <div id="wordListView" class="hidden">
      <div class="wordlist-page">
        <button class="wordlist-back" onclick="showView('modeSelectView')">← ホームに戻る</button>
        <div class="wordlist-header">
          <span class="wordlist-title">学習済み単語一覧</span>
          <span class="wordlist-count" id="wordListCount"></span>
        </div>
        <div id="wordListItems"></div>
      </div>
    </div>

    <!-- 学習: 単語カード -->
    <div id="wordCardView" class="hidden">
      <div class="word-card" id="wordCard">
        <div class="glow" id="glowEl"></div>
        <div class="word-meta">
          <span class="word-num" id="wordNum"></span>
          <span class="pos-badge" id="posBadge"></span>
        </div>
        <div class="word-en" id="wordEn"></div>
        <div class="word-ja" id="wordJa"></div>
        <div class="example-box">
          <div class="ex-en" id="exEn"></div>
          <div class="ex-ja" id="exJa"></div>
        </div>
      </div>
      <div class="nav">
        <button class="nav-btn nb-prev" id="prevBtn" onclick="goPrev()" disabled>← 前へ</button>
        <button class="nav-btn nb-study" id="nextBtn" onclick="goNext()">次へ →</button>
      </div>
    </div>

    <!-- 学習: 活用カード（発音チェック付き） -->
    <div id="conjCardView" class="hidden">
      <div class="conj-card">
        <div class="conj-header"><span class="conj-label">動詞の活用形</span></div>
        <div class="conj-rows" id="conjRows"></div>
        <button class="conj-play" id="conjPlayBtn" onclick="playConj()">▶ もう一度聞く</button>

        <!-- 発音チェックセクション（音声再生後に表示） -->
        <div class="pronun-section hidden" id="pronunSection">
          <div class="pronun-intro">🎤 発音してみよう！</div>
          <div id="pronunSteps"></div>
          <div class="pronun-summary hidden" id="pronunSummary">
            <div class="pronun-stars" id="pronunStars"></div>
            <div class="pronun-score" id="pronunScore"></div>
            <div class="pronun-msg" id="pronunMsg"></div>
          </div>
        </div>
      </div>
      <div class="nav">
        <button class="nav-btn nb-prev" onclick="backToWord()">← 単語に戻る</button>
        <button class="nav-btn nb-study" id="conjNextBtn" onclick="goNextWord()">次の単語 →</button>
      </div>
    </div>

    <!-- クイズ: 問題 -->
    <div id="quizCardView" class="hidden">
      <div class="quiz-card">

function make3sg(w){
  if(/[^aeiou]y$/.test(w)) return w.slice(0,-1)+'ies';
  if(/(s|sh|ch|x|o)$/.test(w)) return w+'es';
  return w+'s';
}
function makePlural(w){
  if(w==='child') return 'children';
  if(w==='man') return 'men';
  if(w==='woman') return 'women';
  if(w==='fish'||w==='sheep'||w==='deer') return w;
  if(/[^aeiou]y$/.test(w)) return w.slice(0,-1)+'ies';
  if(/(s|sh|ch|x)$/.test(w)) return w+'es';
  return w+'s';
}
function detectFormType(cw,ans,conj,pos){
  if(!ans||ans.toLowerCase()===cw.toLowerCase()) return {type:'base'};
  if(conj){const f=conj.split('|');
    if(ans.toLowerCase()===f[0].toLowerCase()) return {type:'conj',idx:0};
    if(f[1]&&ans.toLowerCase()===f[1].toLowerCase()) return {type:'conj',idx:1};
    if(f[2]&&ans.toLowerCase()===f[2].toLowerCase()) return {type:'conj',idx:2};
  }
  if(pos==='動詞'&&(ans===make3sg(cw)||ans===make3sg(cw).replace(/^./,c=>c.toUpperCase()))) return {type:'3sg'};
  if(pos==='名詞'&&ans===makePlural(cw)) return {type:'plural'};
  return {type:'base'};
}
function applyForm(d,fi){
  const w=d.word,c=d.conj||'',p=d.pos;
  if(fi.type==='conj'){const f=c.split('|');return f[fi.idx]||w;}
  if(fi.type==='3sg'&&p==='動詞') return make3sg(w);
  if(fi.type==='plural'&&p==='名詞') return makePlural(w);
  return w;
}
function getDistractors(w,n){
  const fi=detectFormType(w.word,w.ans,w.conj||'',w.pos);
  const sp=ALL_WORDS.filter(x=>x.word!==w.word&&x.pos===w.pos);
  const pool=sp.length>=n?sp:ALL_WORDS.filter(x=>x.word!==w.word);
  return [...pool].sort(()=>Math.random()-.5).slice(0,n).map(d=>d.pos===w.pos?applyForm(d,fi):d.word);
}

function lev(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function isClose(heard,expected){
  const h=heard.toLowerCase().trim(),e=expected.toLowerCase().trim();
  if(h===e) return true;
  if(h.includes(e)||e.includes(h)) return true;
  return lev(h,e)<=Math.max(1,Math.floor(e.length/3));
}


const START=new Date("2026-04-20T00:00:00"),PER_DAY=25,MAX_W=1200;
const PC={"動詞":"#50c878","名詞":"#5b8dee","形容詞":"#f5a623","副詞":"#c97bf5","前置詞":"#f07878","接続詞":"#78d4f0"};
const CL=["原形","過去形","過去分詞"],SRS_KEY="eiken3_srs_v3",HIST_KEY="eiken3_hist_v1";

function loadSRS(){try{return JSON.parse(localStorage.getItem(SRS_KEY)||"{}")}catch(e){return{}}}
function saveSRS(d){try{localStorage.setItem(SRS_KEY,JSON.stringify(d))}catch(e){}}
function loadHist(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||"[]")}catch(e){return[]}}
function addDays(s,n){const d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0]}
function todayStr(){return new Date().toISOString().split("T")[0]}

function recordResult(n,ok){
  const srs=loadSRS(),rec=srs[n]||{wrong:0,interval:1,nextDate:null};
  if(ok){rec.interval=Math.min(rec.interval*2,30);rec.nextDate=addDays(todayStr(),rec.interval);}
  else{rec.wrong=(rec.wrong||0)+1;rec.interval=Math.max(1,Math.ceil(3/rec.wrong));rec.nextDate=addDays(todayStr(),rec.interval);}
  srs[n]=rec;saveSRS(srs);
}
function getReviewWords(d){
  const srs=loadSRS();
  return Object.entries(srs).filter(([,r])=>r.nextDate&&r.nextDate<=d&&r.wrong>0)
    .map(([n])=>ALL_WORDS.find(w=>w.n===parseInt(n))).filter(Boolean);
}
function saveScore(dateStr,day,correct,total,rate){
  const hist=loadHist(),idx=hist.findIndex(h=>h.date===dateStr);
  const rec={date:dateStr,day,correct,total,rate};
  if(idx>=0){if(rate>=hist[idx].rate)hist[idx]=rec;}else hist.push(rec);
  hist.sort((a,b)=>a.date.localeCompare(b.date));
  try{localStorage.setItem(HIST_KEY,JSON.stringify(hist))}catch(e){}
}
function rateColor(r){return r>=80?"#50c878":r>=60?"#f5a623":"#e06060"}

let dayWords=[],wordIdx=0,quizQueue=[],quizIdx=0,qCorrect=0,qWrong=0,curDate="2026-04-20",qAnswered=false;
function dateToDay(s){const d=new Date(s+"T00:00:00");return Math.max(1,Math.floor((d-START)/86400000)+1)}

  ["modeSelectView","statsView","wordCardView","conjCardView","quizCardView","summaryView","noDataView","completeView"]

}

function playConj(){
  const btn=document.getElementById("conjPlayBtn");
  btn.textContent="♪ 再生中...";btn.className="conj-play playing";
  speechSynthesis.cancel();let i=0;
  function nx(){
    if(i>=currentForms.length){
      btn.textContent="▶ もう一度聞く";btn.className="conj-play";
      showPronunSection(); // 再生完了後に発音セクションを表示
      return;
    }

    u.onend=()=>{i++;setTimeout(nx,400);};speechSynthesis.speak(u);

// ── 発音チェック ──────────────────────────────────
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const hasMic=!!SR;
let pronunResults=[];

function showPronunSection(){
  const sec=document.getElementById("pronunSection");
  sec.classList.remove("hidden");
  pronunResults=[];
  const container=document.getElementById("pronunSteps");
  container.innerHTML="";

  if(!hasMic){
    container.innerHTML=`<div class="no-mic-notice">⚠️ このブラウザは発音チェックに対応していません。<br>Safari（iPad）で開いてください。</div>`;
    return;
  }

  // 各活用形のステップを作成
  const uniqueForms=[...new Set(currentForms)]; // 同じ形（put/put/put）は1回だけ
  const formsToCheck=currentForms; // 全3形式チェック（重複含む）

  formsToCheck.forEach((form,i)=>{
    const stepDiv=document.createElement("div");
    stepDiv.className="pronun-step"+(i===0?" active":"");
    stepDiv.id="pstep_"+i;
    const isSame=i>0&&form===formsToCheck[0];
    stepDiv.innerHTML=`
      <div class="pronun-step-label">STEP ${i+1} / ${formsToCheck.length} · ${CL[i]}</div>
      <div class="pronun-step-word">${form}</div>
      <button class="mic-btn${i===0?"":" disabled"}" id="micbtn_${i}" onclick="startListening(${i},'${form}')">
        🎤 タップして発音する
      </button>
      <div class="pronun-result" id="presult_${i}"></div>
    `;
    container.appendChild(stepDiv);
  });
}

function startListening(stepIdx,expected){
  const btn=document.getElementById("micbtn_"+stepIdx);
  if(btn.classList.contains("disabled")) return;
  btn.textContent="🎧 聞いています...";
  btn.className="mic-btn listening";

  const recognition=new SR();
  recognition.lang="en-US";
  recognition.continuous=false;
  recognition.interimResults=false;
  recognition.maxAlternatives=10;

  let resultReceived=false;

  recognition.onresult=(e)=>{
    resultReceived=true;
    const transcripts=Array.from(e.results[0]).map(alt=>alt.transcript.toLowerCase().trim());
    const ok=transcripts.some(t=>isClose(t,expected));
    const heard=transcripts[0];
    showStepResult(stepIdx,expected,ok,heard);
  };

  recognition.onerror=(e)=>{
    resultReceived=true;
    const msgs={
      "not-allowed":         "❌ マイクを許可してください（設定→Safari→マイク→許可）",
      "no-speech":           "🔇 声が聞こえなかったよ。もう少し大きな声で！",
      "network":             "📶 通信エラー。Wi-Fiを確認してもう一度！",
      "audio-capture":       "🎤 マイクが使えません。設定を確認して！",
      "service-not-allowed": "⚠️ このブラウザは音声認識に非対応。SafariかChromeを使ってね",
      "aborted":             "⏹ 中断されました。もう一度タップして！",
    };
    const msg=msgs[e.error]||("エラー("+e.error+")。もう一度試してみて！");
    btn.textContent="🎤 タップして発音する";
    btn.className="mic-btn";
    const resDiv=document.getElementById("presult_"+stepIdx);
    resDiv.className="pronun-result ng";
    resDiv.textContent=msg;
  };

  recognition.onend=()=>{
    if(!resultReceived){
      btn.textContent="🎤 タップして発音する";
      btn.className="mic-btn";
      const resDiv=document.getElementById("presult_"+stepIdx);
      resDiv.className="pronun-result ng";
      resDiv.textContent="🔇 声が聞こえなかったよ。もう一度大きめに言ってみて！";
    }
  };

  // iOS Safari: slight delay after setup before start
  setTimeout(() => {
    try {
      recognition.start();
    } catch(err) {
      resultReceived = true;
      btn.textContent = "🎤 タップして発音する";
      btn.className = "mic-btn";
      const resDiv = document.getElementById("presult_" + stepIdx);
      resDiv.className = "pronun-result ng";
      resDiv.textContent = "⚠️ 音声認識を開始できませんでした。もう一度タップして！";
    }
  }, 100);
}

function showStepResult(stepIdx,expected,ok,heard){
  const step=document.getElementById("pstep_"+stepIdx);
  const resDiv=document.getElementById("presult_"+stepIdx);
  const btn=document.getElementById("micbtn_"+stepIdx);
  step.classList.remove("active");
  step.classList.add(ok?"done-ok":"done-ng");
  btn.className="mic-btn disabled";
  resDiv.className="pronun-result "+(ok?"ok":"ng");
  if(ok){
    resDiv.textContent="✅ 正解！ 「"+expected+"」 バッチリ！";
  } else {
    resDiv.textContent=`❌ 「${heard}」と聞こえたよ。正しくは「${expected}」だよ！`;
    // 正解の発音をもう一度聞かせる
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(expected);u.lang="en-US";u.rate=0.7;
      speechSynthesis.speak(u);
    },500);
  }
  pronunResults.push({expected,ok});

  // 次のステップをアクティブに
  const nextIdx=stepIdx+1;
  const nextBtn=document.getElementById("micbtn_"+nextIdx);
  const nextStep=document.getElementById("pstep_"+nextIdx);
  if(nextBtn){
    nextBtn.classList.remove("disabled");
    nextStep.classList.add("active");
    nextStep.scrollIntoView({behavior:"smooth",block:"nearest"});
  } else {
    // 全ステップ完了
    setTimeout(()=>showPronunSummary(),600);
  }
}

function showPronunSummary(){
  const total=pronunResults.length;
  const correct=pronunResults.filter(r=>r.ok).length;
  const stars="⭐".repeat(correct)+"☆".repeat(total-correct);
  const msgs=[
    ["もう少し練習しよう！", "がんばって！", "少しできてるよ！"],
    ["いいね！あと少し！", "惜しい！もう一度！", ""],
    ["", "", "完璧！すごい！🎉"]
  ];
  const msg=correct===0?"もう少し練習しよう！💪":
            correct===total?"パーフェクト！🎉🎉🎉":
            correct===total-1?"惜しい！もう一回！":
            "がんばってる！続けよう！";
  document.getElementById("pronunStars").textContent=stars;
  document.getElementById("pronunScore").textContent=`${correct} / ${total} 正解`;
  document.getElementById("pronunMsg").textContent=msg;
  document.getElementById("pronunSummary").classList.remove("hidden");
  document.getElementById("pronunSummary").scrollIntoView({behavior:"smooth",block:"nearest"});
}

// ── クイズ ──────────────────────────────────────
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function startQuiz(){
  setMode("quiz");
  const rev=getReviewWords(curDate),revNs=new Set(rev.map(w=>w.n)),todNs=new Set(dayWords.map(w=>w.n));
  const combined=[...dayWords,...rev.filter(w=>!todNs.has(w.n))];
  quizQueue=shuffle(combined);
  quizQueue.forEach(w=>{w._rev=revNs.has(w.n)&&!todNs.has(w.n);});
  quizIdx=0;qCorrect=0;qWrong=0;renderQuizQ();
}

function renderQuizQ(){
  if(quizIdx>=quizQueue.length){showSummary();return;}
  const w=quizQueue[quizIdx];qAnswered=false;
  updProgress(quizIdx+1,quizQueue.length,"副詞");
  document.getElementById("wordRange").textContent=`クイズ ${quizIdx+1} / ${quizQueue.length}`;
  const rb=document.getElementById("reviewBadge");
  w._rev?rb.classList.remove("hidden"):rb.classList.add("hidden");
  document.getElementById("quizSentence").innerHTML=w.ex_en.replace(/___[a-z]*/g,'<span class="quiz-blank">＿＿＿</span>');
  document.getElementById("quizJa").textContent=w.ex_ja;
  const ans=(w.ans||w.word).toLowerCase();
  const distractors=getDistractors(w,3).map(d=>d.toLowerCase());
  const choices=shuffle([ans,...distractors]);
  const grid=document.getElementById("choicesGrid");grid.innerHTML="";
  choices.forEach(c=>{
    const btn=document.createElement("button");btn.className="choice-btn";btn.textContent=c;
    btn.onclick=()=>answerQ(c,ans,w,btn);grid.appendChild(btn);
  });
  document.getElementById("quizResult").style.display="none";
  document.getElementById("quizResult").className="quiz-result";
  const qnb=document.getElementById("quizNextBtn");
  qnb.style.display="none";
  qnb.textContent=quizIdx===quizQueue.length-1?"結果を見る →":"次の問題 →";
  showView("quizCardView");
}

function answerQ(chosen,ans,word,clickedBtn){
  if(qAnswered)return;qAnswered=true;
  const ok=(chosen===ans);
  document.getElementById("choicesGrid").querySelectorAll(".choice-btn").forEach(b=>{
    b.disabled=true;if(b.textContent===ans)b.classList.add("show-correct");
  });
  if(!ok)clickedBtn.classList.add("wrong");else clickedBtn.classList.add("correct");
  const res=document.getElementById("quizResult");
  if(ok){res.className="quiz-result correct";res.textContent="正解！";qCorrect++;}
  else{res.className="quiz-result wrong";res.textContent=`不正解。正解は「${ans}」`;qWrong++;}
  recordResult(word.n,ok);
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(ans);u.lang="en-US";u.rate=0.85;speechSynthesis.speak(u);
  document.getElementById("quizNextBtn").style.display="block";
}
function nextQuizQ(){quizIdx++;renderQuizQ();}

// ── Summary & History ──────────────────────────
function renderHistChart(hist,chartId,listId){
  const chart=document.getElementById(chartId),list=document.getElementById(listId);
  if(!hist.length){chart.innerHTML="";list.innerHTML="";return;}
  chart.innerHTML=hist.slice(-14).map(h=>{
    const col=rateColor(h.rate),hpx=Math.round(56*h.rate/100),md=h.date.slice(5);
    return `<div class="hist-bar-wrap"><div class="hist-bar-pct">${h.rate}%</div><div class="hist-bar-bg"><div class="hist-bar-fill" style="height:${hpx}px;background:${col}"></div></div><div class="hist-bar-date">${md}</div></div>`;
  }).join("");
  list.innerHTML=[...hist].reverse().map(h=>{
    const col=rateColor(h.rate);
    return `<div class="hist-row"><span class="hist-row-date">${h.date}</span><span class="hist-row-day">Day ${h.day}</span><div class="hist-row-bar"><div class="hist-row-fill" style="width:${h.rate}%;background:${col}"></div></div><span class="hist-row-pct" style="color:${col}">${h.rate}%</span></div>`;
  }).join("");
}

function showSummary(){
  const tot=quizQueue.length,rate=tot>0?Math.round((qCorrect/tot)*100):0;
  document.getElementById("sumCorrect").textContent=qCorrect+" 問";
  document.getElementById("sumWrong").textContent=qWrong+" 問";
  const re=document.getElementById("sumRate");re.textContent=rate+"%";
  re.className="summary-val "+(rate>=80?"val-good":rate>=60?"val-warn":"val-bad");
  const srs=loadSRS();
  const weak=Object.entries(srs).filter(([,r])=>r.wrong>=2).sort(([,a],[,b])=>b.wrong-a.wrong).slice(0,5)
    .map(([n,r])=>{const w=ALL_WORDS.find(x=>x.n===parseInt(n));return w?{word:w.word,ans:(w.ans||w.word).toLowerCase(),wrong:r.wrong}:null;}).filter(Boolean);
  document.getElementById("weakList").innerHTML=weak.length>0?`<div class="weak-title">苦手な単語</div>`+
    weak.map(w=>`<div class="weak-item"><span class="weak-word">${w.word} <span style="font-size:13px;color:#6a6888">(${w.ans})</span></span><span class="weak-cnt">${w.wrong}回</span></div>`).join(""):"";
  saveScore(curDate,dateToDay(curDate),qCorrect,tot,rate);
  renderHistChart(loadHist(),"histChart","histList");
  document.getElementById("histSection").style.display="block";
  document.getElementById("wordRange").textContent="クイズ完了";
  document.getElementById("counter").classList.add("hidden");
  showView("summaryView");
}

function showStats(){
  renderHistChart(loadHist(),"statsChart","statsListHist");
  const srs=loadSRS();
  const weak=Object.entries(srs).filter(([,r])=>r.wrong>=2).sort(([,a],[,b])=>b.wrong-a.wrong).slice(0,10)
    .map(([n,r])=>{const w=ALL_WORDS.find(x=>x.n===parseInt(n));return w?{word:w.word,ans:(w.ans||w.word).toLowerCase(),wrong:r.wrong}:null;}).filter(Boolean);
  document.getElementById("statsWeak").innerHTML=weak.length>0
    ?weak.map(w=>`<div class="weak-item"><span class="weak-word">${w.word} <span style="font-size:13px;color:#6a6888">(${w.ans})</span></span><span class="weak-cnt">${w.wrong}回</span></div>`).join("")
    :'<div style="font-size:14px;color:#3a3860;padding:10px 0">苦手な単語はまだありません 🎉</div>';
  showView("statsView");
}

function startStudy(){renderWord();}
function startQuizFromSelect(){startQuiz();}


function showWordList(){
  const srs=loadSRS();
  const studied=ALL_WORDS.filter(w=>{
    const day=Math.ceil(w.n/PER_DAY);
    const dayDate=new Date(START.getTime()+(day-1)*86400000).toISOString().split("T")[0];
    return dayDate<=curDate;
  });
  if(!studied.length){
    document.getElementById("wordListCount").textContent="まだ学習していません";
    document.getElementById("wordListItems").innerHTML='<div class="wordlist-empty">日付を進めると<br>学習した単語が表示されます</div>';
    showView("wordListView");return;
  }
  const sorted=[...studied].sort((a,b)=>{
    const ra=srs[a.n]||{wrong:0};const rb=srs[b.n]||{wrong:0};
    if(rb.wrong!==ra.wrong) return rb.wrong-ra.wrong;
    return a.word.localeCompare(b.word);
  });
  document.getElementById("wordListCount").textContent=sorted.length+"語";
  document.getElementById("wordListItems").innerHTML=sorted.map((w,i)=>{
    const rec=srs[w.n]||{wrong:0};
    let badge,bclass;
    if(rec.wrong>=1){badge=rec.wrong+"回間違え";bclass="badge-weak";}
    else if(srs[w.n]){badge="習得";bclass="badge-ok";}
    else{badge="未テスト";bclass="badge-new";}
    return `<div class="wordlist-item" onclick="jumpToWord(${w.n})">
      <span class="wordlist-rank">${i+1}</span>
      <span class="wordlist-word">${w.word}</span>
      <span class="wordlist-meaning">${w.meaning}</span>
      <span class="wordlist-badge ${bclass}">${badge}</span>
    </div>`;
  }).join("");
  showView("wordListView");
}
function jumpToWord(n){
  const w=ALL_WORDS.find(x=>x.n===n);if(!w) return;
  const day=Math.ceil(w.n/PER_DAY);
  const st=(day-1)*PER_DAY+1,en=st+PER_DAY-1;
  dayWords=ALL_WORDS.filter(x=>x.n>=st&&x.n<=en);
  wordIdx=dayWords.findIndex(x=>x.n===n);
  if(wordIdx<0) wordIdx=0;
  setMode("study");renderWord();
}

function loadDay(s){
  curDate=s;const day=dateToDay(s),st=(day-1)*PER_DAY+1,en=st+PER_DAY-1;
  document.getElementById("dayBadge").textContent="Day "+day;
  document.getElementById("wordRange").textContent="第"+st+"語〜第"+Math.min(en,MAX_W)+"語";
  document.getElementById("counter").classList.add("hidden");
  document.getElementById("progressFill").style.width="0%";
  wordIdx=0;
  if(st>MAX_W){showView("completeView");return;}
  dayWords=ALL_WORDS.filter(w=>w.n>=st&&w.n<=en);
  if(!dayWords.length){showView("noDataView");return;}
  const revCount=getReviewWords(s).filter(w=>!dayWords.find(d=>d.n===w.n)).length;
  document.getElementById("modeSelectTitle").textContent="Day "+day;
  document.getElementById("modeSelectSub").textContent=revCount>0?`今日の25語 + 復習語 ${revCount}語`:"今日の25語で学習・テスト";
  setMode("study");showView("modeSelectView");
}
document.getElementById("dateInput").addEventListener("change",e=>loadDay(e.target.value));
loadDay("2026-04-20");
</script>
